version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: node-x-db
    restart: always
    environment:
      POSTGRES_DB: node_x_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: node-x-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgrespassword@database:5432/node_x_db?schema=public
      JWT_SECRET: node-x-super-secret-key-change-in-production
      ADMIN_EMAIL: admin@node-x.my.id
      ADMIN_PASSWORD: adminpassword
      STORAGE_PROVIDER: local
      STORAGE_PATH: /app/storage
      FRONTEND_URL: https://node-x.my.id
    volumes:
      - ./storage:/app/storage
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: node-x-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: node-x-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
